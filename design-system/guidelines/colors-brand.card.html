<!-- @dsCard group="Colors" viewport="700x150" name="Brand & Accent" subtitle="Talegate Indigo (twilight) + Candle Amber (the glow)" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--parchment);padding:18px;font-family:var(--font-mono)}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .sw{flex:1;min-width:120px;border-radius:var(--radius-md);padding:12px 14px;height:104px;display:flex;flex-direction:column;justify-content:flex-end;box-shadow:var(--shadow-sm)}
  .name{font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
  .hex{font-size:11px;opacity:.7;margin-top:2px}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--indigo-700);color:#fff"><span class="name">Indigo 700</span><span class="hex">#322C7A</span></div>
  <div class="sw" style="background:var(--indigo-600);color:#fff"><span class="name">Indigo 600 · brand</span><span class="hex">#423AA0</span></div>
  <div class="sw" style="background:var(--indigo-500);color:#fff"><span class="name">Indigo 500</span><span class="hex">#5B50C9</span></div>
  <div class="sw" style="background:var(--candle-500);color:#3b2a10"><span class="name">Candle 500 · accent</span><span class="hex">#E89B3C</span></div>
  <div class="sw" style="background:var(--candle-400);color:#3b2a10"><span class="name">Candle 400</span><span class="hex">#F2B566</span></div>
  <div class="sw" style="background:var(--indigo-50);color:var(--indigo-700)"><span class="name">Indigo 50 · tint</span><span class="hex">#ECEAF8</span></div>
</div>
</body></html>

<!-- @dsCard group="Colors" viewport="700x130" name="Status" subtitle="Success · Warning · Betrayal (destructive)" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--parchment);padding:18px;font-family:var(--font-mono)}
  .row{display:flex;gap:12px}
  .chip{flex:1;border-radius:var(--radius-md);padding:14px 16px;display:flex;flex-direction:column;gap:4px}
  .name{font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
  .hex{font-size:10px;opacity:.75}
</style></head><body>
<div class="row">
  <div class="chip" style="background:var(--success-50);color:var(--success-600)"><span class="name">Success</span><span class="hex">#4F8A5B on #E6F1E8</span></div>
  <div class="chip" style="background:var(--warning-50);color:var(--warning-600)"><span class="name">Warning</span><span class="hex">#D9892C on #FBEFDD</span></div>
  <div class="chip" style="background:var(--danger-50);color:var(--danger-600)"><span class="name">Betrayal</span><span class="hex">#C5523F on #F7E3DF</span></div>
</div>
</body></html>

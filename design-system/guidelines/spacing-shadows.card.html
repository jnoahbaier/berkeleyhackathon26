<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows & Glass" subtitle="Soft, warm-tinted, low-opacity depth" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--parchment-deep);padding:26px 24px;display:flex;gap:20px;align-items:center;font-family:var(--font-mono)}
.u{display:flex;flex-direction:column;align-items:center;gap:10px}
.b{width:96px;height:80px;background:var(--paper);border-radius:var(--radius-lg);display:grid;place-items:center}
.n{font-size:10px;color:var(--ink-400);letter-spacing:.04em}
.dot{width:34px;height:34px;border-radius:50%;background:var(--glass-fill);backdrop-filter:var(--blur-glass)}</style></head><body>
<div class="u"><div class="b" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
<div class="u"><div class="b" style="box-shadow:var(--shadow-md)"></div><span class="n">md</span></div>
<div class="u"><div class="b" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
<div class="u"><div class="b" style="box-shadow:var(--shadow-xl)"></div><span class="n">xl</span></div>
<div class="u"><div class="b" style="box-shadow:var(--shadow-glass)"><div class="dot"></div></div><span class="n">glass</span></div>
</body></html>

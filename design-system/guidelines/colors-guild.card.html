<!-- @dsCard group="Colors" viewport="700x150" name="Guild Seats" subtitle="Four character colors + soft tints" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--parchment);padding:18px;font-family:var(--font-mono)}
  .row{display:flex;gap:14px}
  .seat{flex:1;display:flex;flex-direction:column;gap:6px}
  .dot{height:64px;border-radius:var(--radius-md);box-shadow:var(--shadow-sm)}
  .tint{height:26px;border-radius:var(--radius-sm)}
  .lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-500);font-weight:600}
</style></head><body>
<div class="row">
  <div class="seat"><div class="dot" style="background:var(--guild-1)"></div><div class="tint" style="background:var(--guild-1-soft)"></div><span class="lbl">Clay rose</span></div>
  <div class="seat"><div class="dot" style="background:var(--guild-2)"></div><div class="tint" style="background:var(--guild-2-soft)"></div><span class="lbl">Sage teal</span></div>
  <div class="seat"><div class="dot" style="background:var(--guild-3)"></div><div class="tint" style="background:var(--guild-3-soft)"></div><span class="lbl">Periwinkle</span></div>
  <div class="seat"><div class="dot" style="background:var(--guild-4)"></div><div class="tint" style="background:var(--guild-4-soft)"></div><span class="lbl">Old gold</span></div>
</div>
</body></html>

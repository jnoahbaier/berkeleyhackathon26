<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--parchment);padding:22px 24px;display:flex;align-items:flex-end;gap:16px;font-family:var(--font-mono)}
.u{display:flex;flex-direction:column;align-items:center;gap:8px}
.b{background:var(--indigo-600);border-radius:4px;width:100%}
.n{font-size:10px;color:var(--ink-400);letter-spacing:.04em}</style></head><body>
<div class="u" style="width:4px"><div class="b" style="height:4px"></div><span class="n">2</span></div>
<div class="u" style="width:8px"><div class="b" style="height:8px"></div><span class="n">4</span></div>
<div class="u" style="width:12px"><div class="b" style="height:12px"></div><span class="n">8</span></div>
<div class="u" style="width:16px"><div class="b" style="height:16px"></div><span class="n">12</span></div>
<div class="u" style="width:20px"><div class="b" style="height:20px"></div><span class="n">16</span></div>
<div class="u" style="width:28px"><div class="b" style="height:28px"></div><span class="n">24</span></div>
<div class="u" style="width:36px"><div class="b" style="height:36px"></div><span class="n">32</span></div>
<div class="u" style="width:52px"><div class="b" style="height:52px"></div><span class="n">48</span></div>
<div class="u" style="width:68px"><div class="b" style="height:68px"></div><span class="n">64</span></div>
</body></html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--parchment);padding:18px;font-family:var(--font-mono)}
  .row{display:flex;gap:14px}
  .g{flex:1;height:126px;border-radius:var(--radius-lg);box-shadow:var(--shadow-md);display:flex;align-items:flex-end;padding:12px}
  .lbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
</style></head><body>
<div class="row">
  <div class="g" style="background:var(--gradient-dusk)"><span class="lbl" style="color:#3b2f22">Dusk</span></div>
  <div class="g" style="background:var(--gradient-night)"><span class="lbl" style="color:#ede7da">Night</span></div>
  <div class="g" style="background:#1c1930"><span class="lbl" style="color:#f4d2a6;position:relative;z-index:1">Candle glow</span><div style="position:absolute;inset:0;background:var(--gradient-glow);border-radius:var(--radius-lg)"></div></div>
</div>
</body></html>

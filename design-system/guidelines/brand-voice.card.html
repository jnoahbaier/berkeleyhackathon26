<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--parchment);padding:22px 24px;display:flex;gap:18px}
.col{flex:1;background:var(--paper);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow-sm)}
.tag{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--candle-600);font-weight:600;margin-bottom:10px}</style></head><body>
<div class="col"><div class="tag">Story · Newsreader</div><p style="font-family:var(--font-serif);font-size:19px;line-height:1.6;color:var(--ink-800,#3b362d);margin:0">"The gate, or the river? Mara waits for your word — and the night is not patient."</p></div>
<div class="col"><div class="tag">Product · Schibsted</div><p style="font-family:var(--font-sans);font-size:16px;line-height:1.55;color:var(--ink-700);margin:0">Your word is sealed. The others have until 10pm — then tonight's chapter is lit. 🌙</p></div>

<!-- @dsCard group="Colors" viewport="700x150" name="Warm Neutrals" subtitle="Ink on parchment — warm, never grey" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--parchment);padding:18px;font-family:var(--font-mono)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{flex:1;min-width:96px;border-radius:var(--radius-md);padding:10px 12px;height:104px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--line)}
  .name{font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
  .hex{font-size:10px;opacity:.7;margin-top:2px}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--ink-900);color:#fff"><span class="name">Ink 900</span><span class="hex">#16140F</span></div>
  <div class="sw" style="background:var(--ink-500);color:#fff"><span class="name">Ink 500</span><span class="hex">#6B6457</span></div>
  <div class="sw" style="background:var(--ink-300);color:#3b362d"><span class="name">Ink 300</span><span class="hex">#B6AE9D</span></div>
  <div class="sw" style="background:var(--parchment-deep);color:#6b6457"><span class="name">Parchment-deep</span><span class="hex">#F4EEE2</span></div>
  <div class="sw" style="background:var(--parchment);color:#6b6457"><span class="name">Parchment · bg</span><span class="hex">#FAF6EF</span></div>
  <div class="sw" style="background:var(--paper);color:#6b6457"><span class="name">Paper · card</span><span class="hex">#FFFFFF</span></div>
</div>
</body></html>

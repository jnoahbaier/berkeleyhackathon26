<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--parchment);padding:22px 24px;display:flex;gap:16px;align-items:flex-end;font-family:var(--font-mono)}
.u{display:flex;flex-direction:column;align-items:center;gap:8px}
.b{width:88px;height:74px;background:var(--paper);border:1.5px solid var(--line-strong);box-shadow:var(--shadow-sm)}
.n{font-size:10px;color:var(--ink-400);letter-spacing:.04em}</style></head><body>
<div class="u"><div class="b" style="border-radius:12px"></div><span class="n">sm · 12</span></div>
<div class="u"><div class="b" style="border-radius:18px"></div><span class="n">md · 18</span></div>
<div class="u"><div class="b" style="border-radius:26px"></div><span class="n">lg · 26</span></div>
<div class="u"><div class="b" style="border-radius:34px"></div><span class="n">xl · 34</span></div>
<div class="u"><div class="b" style="border-radius:44px"></div><span class="n">2xl · 44</span></div>
<div class="u"><div class="b" style="border-radius:999px;width:74px"></div><span class="n">pill</span></div>
</body></html>

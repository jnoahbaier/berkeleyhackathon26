<!-- @dsCard group="Colors" viewport="700x150" name="Night Surfaces" subtitle="Deep indigo reading mode — warm paper text" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--night-900);padding:18px;font-family:var(--font-mono)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .sw{flex:1;min-width:96px;border-radius:var(--radius-md);padding:10px 12px;height:104px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--night-600)}
  .name{font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--night-text)}
  .hex{font-size:10px;color:var(--night-muted);margin-top:2px}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--night-900)"><span class="name">Night 900 · ground</span><span class="hex">#131120</span></div>
  <div class="sw" style="background:var(--night-800)"><span class="name">Night 800</span><span class="hex">#1C1930</span></div>
  <div class="sw" style="background:var(--night-700)"><span class="name">Night 700 · card</span><span class="hex">#272340</span></div>
  <div class="sw" style="background:var(--indigo-300)"><span class="name" style="color:#1b1830">Indigo 300</span><span class="hex" style="color:#1b1830">#A59CEC</span></div>
  <div class="sw" style="background:var(--night-text)"><span class="name" style="color:#1b1830">Night text</span><span class="hex" style="color:#5a5468">#EDE7DA</span></div>
</div>
</body></html>

<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--parchment); padding: 26px; }
  .wrap { display: flex; gap: 22px; flex-wrap: wrap; align-items: flex-start; }
  .col { display: flex; flex-direction: column; gap: 18px; }
  .cap { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-400); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, SegmentedControl, Stepper, Choice } = window.BabelDesignSystem_2e9b76;
  function Demo() {
    const [mode, setMode] = React.useState('Read');
    const [players, setPlayers] = React.useState(3);
    const [pick, setPick] = React.useState('A');
    return (
      <div className="wrap">
        <div className="col" style={{ width: 290 }}>
          <Input label="Guild name" placeholder="The Night Owls" defaultValue="The Night Owls" />
          <div>
            <div className="cap" style={{ marginBottom: 8 }}>Mode</div>
            <SegmentedControl options={["Read","Listen"]} value={mode} onChange={setMode} />
          </div>
          <div>
            <div className="cap" style={{ marginBottom: 8 }}>Players · pages per night</div>
            <Stepper value={players} min={2} max={4} suffix="players" onChange={setPlayers} />
          </div>
        </div>
        <div className="col" style={{ width: 320, background: 'var(--night-900)', borderRadius: 'var(--radius-xl)', padding: 20 }}>
          <div className="cap" style={{ color: 'var(--night-muted)' }}>Tonight — the gate, or the river?</div>
          <Choice letter="A" selected={pick==='A'} onClick={() => setPick('A')} meta="2 of 4 chose this">Open the gate and trust her.</Choice>
          <Choice letter="B" flavor="betrayal" selected={pick==='B'} onClick={() => setPick('B')} meta="Betrayal">Cut the rope. Let the river take him.</Choice>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>

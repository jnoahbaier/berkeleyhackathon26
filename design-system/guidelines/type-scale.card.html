<!-- @dsCard group="Type" viewport="700x230" name="Type Scale" subtitle="Display-led ramp, sans + serif" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--parchment);padding:18px 24px}
.r{display:flex;align-items:baseline;gap:14px;padding:5px 0;border-bottom:1px solid var(--line)}
.r:last-child{border:0}
.t{color:var(--ink-900)}
.m{font-family:var(--font-mono);font-size:10px;color:var(--ink-400);letter-spacing:.06em;margin-left:auto;white-space:nowrap}</style></head><body>
<div class="r"><span class="t" style="font-family:var(--font-sans);font-weight:700;font-size:40px;letter-spacing:-.02em">Display</span><span class="m">SANS 40 / 700</span></div>
<div class="r"><span class="t" style="font-family:var(--font-sans);font-weight:700;font-size:32px;letter-spacing:-.015em">Heading 1</span><span class="m">SANS 32 / 700</span></div>
<div class="r"><span class="t" style="font-family:var(--font-sans);font-weight:600;font-size:21px">Heading 3</span><span class="m">SANS 21 / 600</span></div>
<div class="r"><span class="t" style="font-family:var(--font-serif);font-size:20px">Reading body — Newsreader</span><span class="m">SERIF 20 / 400</span></div>
<div class="r"><span class="t" style="font-family:var(--font-sans);font-size:16px;color:var(--ink-700)">UI body — Schibsted Grotesk</span><span class="m">SANS 16 / 400</span></div>
</body></html>
